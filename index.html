<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Global User Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: system-ui, sans-serif;
}
#earth-container {
  width: 100%;
  height: 100%;
  position: relative;
}
#searchBox {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 14px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  background: rgba(0,0,0,0.55);
  color: #fff;
  z-index: 10;
}
</style>
</head>

<body>
<div id="earth-container">
  <input id="searchBox" placeholder="User suchen (z.B. user_42)" />
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

/* ===== KONSTANTEN ===== */
const RADIUS = 1.045;

const IMAGE_SCALE_IDLE   = 0.02;
const IMAGE_SCALE_HOVER  = 0.22;
const IMAGE_SCALE_ACTIVE = 0.32;

/* ===== Setup ===== */
const container = document.getElementById("earth-container");
const scene = new THREE.Scene();

const cameraHome = new THREE.Vector3(0, 0, 3.8);
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.copy(cameraHome);

/* ===== Renderer ===== */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.setClearColor(0x000000);
container.appendChild(renderer.domElement);

/* ===== Licht ===== */
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
scene.add(new THREE.HemisphereLight(0xffffff, 0x223344, 0.55));

const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(8, 4, 6);
scene.add(sun);

/* ===== Erde ===== */
const loader = new THREE.TextureLoader();
const earthTex = loader.load(
  "https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"
);
earthTex.colorSpace = THREE.SRGBColorSpace;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshPhongMaterial({ map: earthTex, shininess: 8 })
);
scene.add(earth);

/* ===== Wolken ===== */
const cloudTex = loader.load(
  "https://threejs.org/examples/textures/planets/earth_clouds_1024.png"
);
cloudTex.colorSpace = THREE.SRGBColorSpace;

const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01, 64, 64),
  new THREE.MeshBasicMaterial({
    map: cloudTex,
    transparent: true,
    opacity: 0.35,
    depthWrite: false
  })
);
scene.add(clouds);

/* ===== User-Bilder ===== */
const userTex = loader.load("assets/user_test.jpg");
userTex.colorSpace = THREE.SRGBColorSpace;

const baseUserMat = new THREE.SpriteMaterial({
  map: userTex,
  transparent: true,
  depthTest: false
});

const dots = [];

for (let i = 0; i < 700; i++) {
  const g = new THREE.Group();

  const img = new THREE.Sprite(baseUserMat.clone());
  img.scale.set(IMAGE_SCALE_IDLE, IMAGE_SCALE_IDLE, 1);
  img.position.set(0, 0, 0.06);
  img.renderOrder = 10;
  g.add(img);

  const lat = Math.acos(1 - 2 * Math.random()) - Math.PI / 2;
  const lon = Math.random() * Math.PI * 2;

  g.position.set(
    Math.cos(lat) * Math.cos(lon) * RADIUS,
    Math.sin(lat) * RADIUS,
    Math.cos(lat) * Math.sin(lon) * RADIUS
  );

  g.userData = { lat, lon, image: img };
  earth.add(g);
  dots.push(g);
}

/* ===== Interaktion ===== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovered = null;
let active = null;

window.addEventListener("mousemove", e => {
  mouse.x = (e.clientX / container.clientWidth) * 2 - 1;
  mouse.y = -(e.clientY / container.clientHeight) * 2 + 1;
});

window.addEventListener("click", () => {
  if (!hovered) return;

  active = hovered;

  dots.forEach(d => {
    if (d !== active) {
      d.userData.image.scale.set(
        IMAGE_SCALE_IDLE,
        IMAGE_SCALE_IDLE,
        1
      );
    }
  });

  active.userData.image.scale.set(
    IMAGE_SCALE_ACTIVE,
    IMAGE_SCALE_ACTIVE,
    1
  );
});

window.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    active = null;
    dots.forEach(d => {
      d.userData.image.scale.set(
        IMAGE_SCALE_IDLE,
        IMAGE_SCALE_IDLE,
        1
      );
    });
  }
});

/* ===== Animation ===== */
function animate() {
  requestAnimationFrame(animate);

  earth.rotation.y += 0.0014;
  clouds.rotation.y += 0.003;

  dots.forEach(d => d.lookAt(camera.position));

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(
    dots.map(d => d.userData.image),
    false
  );

  if (hits.length && !active) {
    const g = dots.find(d => d.userData.image === hits[0].object);
    if (hovered !== g) {
      if (hovered) {
        hovered.userData.image.scale.set(
          IMAGE_SCALE_IDLE,
          IMAGE_SCALE_IDLE,
          1
        );
      }
      hovered = g;
      hovered.userData.image.scale.set(
        IMAGE_SCALE_HOVER,
        IMAGE_SCALE_HOVER,
        1
      );
    }
  } else if (!hits.length && hovered && !active) {
    hovered.userData.image.scale.set(
      IMAGE_SCALE_IDLE,
      IMAGE_SCALE_IDLE,
      1
    );
    hovered = null;
  }

  if (active) {
    const target = active.getWorldPosition(new THREE.Vector3())
      .normalize()
      .multiplyScalar(2.2);
    camera.position.lerp(target, 0.06);
  } else {
    camera.position.lerp(cameraHome, 0.06);
  }

  camera.lookAt(earth.position);
  renderer.render(scene, camera);
}
animate();

/* ===== Resize ===== */
window.addEventListener("resize", () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});
</script>
</body>
</html>
