<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>Global User Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  font-family: system-ui, sans-serif;
}
#earth-container {
  width: 100%;
  height: 100%;
  position: relative;
  touch-action: none;
}
#searchBox {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 14px;
  font-size: 14px;
  border-radius: 6px;
  border: none;
  background: rgba(0,0,0,0.55);
  color: #fff;
  z-index: 10;
}
</style>
</head>

<body>
<div id="earth-container">
  <input id="searchBox" placeholder="User suchen (z.B. user_42)" />
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

/* ===== FLAGS & KONSTANTEN ===== */
const IS_TOUCH = "ontouchstart" in window;

const RADIUS = 1.045;
const IMAGE_IDLE   = 0.02;
const IMAGE_HOVER  = IS_TOUCH ? 0.30 : 0.18;
const IMAGE_ACTIVE = IS_TOUCH ? 0.40 : 0.30;
const IMAGE_PRESS  = 0.32;
const CAMERA_DIST  = 2.2;

/* ===== SETUP ===== */
const container = document.getElementById("earth-container");
const scene = new THREE.Scene();

const cameraHome = new THREE.Vector3(0, 0, 3.8);
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.copy(cameraHome);

/* ===== RENDERER ===== */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
container.appendChild(renderer.domElement);

/* ===== LICHT ===== */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(6, 4, 8);
scene.add(sun);

/* ===== ERDE ===== */
const loader = new THREE.TextureLoader();
const earthTex = loader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg");
earthTex.colorSpace = THREE.SRGBColorSpace;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshPhongMaterial({
    map: earthTex,
    shininess: 12,
    specular: new THREE.Color(0x222222)
  })
);
scene.add(earth);

/* ===== WOLKEN ===== */
const cloudTex = loader.load("https://threejs.org/examples/textures/planets/earth_clouds_1024.png");
cloudTex.colorSpace = THREE.SRGBColorSpace;

const clouds = new THREE.Mesh(
  new THREE.SphereGeometry(1.01, 64, 64),
  new THREE.MeshBasicMaterial({
    map: cloudTex,
    transparent: true,
    opacity: 0.35,
    depthWrite: false
  })
);
scene.add(clouds);

/* ===== USER SPRITES ===== */
const userTex = loader.load("assets/user_test.jpg");
userTex.colorSpace = THREE.SRGBColorSpace;
userTex.generateMipmaps = false;
userTex.minFilter = THREE.LinearFilter;
userTex.magFilter = THREE.LinearFilter;

const baseMat = new THREE.SpriteMaterial({
  map: userTex,
  transparent: true,
  depthTest: false
});

const dots = [];
for (let i = 0; i < 700; i++) {
  const g = new THREE.Group();
  const img = new THREE.Sprite(baseMat.clone());

  img.scale.set(IMAGE_IDLE, IMAGE_IDLE, 1);
  img.position.set(0, 0, 0.06);
  g.add(img);

  const lat = Math.acos(1 - 2 * Math.random()) - Math.PI / 2;
  const lon = Math.random() * Math.PI * 2;

  g.position.set(
    Math.cos(lat) * Math.cos(lon) * RADIUS,
    Math.sin(lat) * RADIUS,
    Math.cos(lat) * Math.sin(lon) * RADIUS
  );

  g.userData = {
    id: "user_" + i,
    image: img,
    url: i % 5 === 0 ? "https://example.com" : null
  };

  earth.add(g);
  dots.push(g);
}

/* ===== INTERAKTION ===== */
const raycaster = new THREE.Raycaster();
raycaster.params.Sprite.threshold = 0.15; // 🔑 Touch-Fix

const mouse = new THREE.Vector2();
let hovered = null;
let active = null;
let touchPos = null;
let isTouching = false;

function resetFocus() {
  active = null;
  hovered = null;
  dots.forEach(d => d.userData.image.scale.set(IMAGE_IDLE, IMAGE_IDLE, 1));
}

/* Suche */
const searchBox = document.getElementById("searchBox");
searchBox.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const found = dots.find(d => d.userData.id === searchBox.value.trim());
  if (!found) return;
  resetFocus();
  active = found;
  active.userData.image.scale.set(IMAGE_ACTIVE, IMAGE_ACTIVE, 1);
});

/* Desktop Hover */
window.addEventListener("mousemove", e => {
  if (IS_TOUCH || active) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

/* Touch Start */
renderer.domElement.addEventListener("pointerdown", e => {
  if (!IS_TOUCH) return;
  isTouching = true;

  const rect = renderer.domElement.getBoundingClientRect();
  touchPos = {
    x: ((e.clientX - rect.left) / rect.width) * 2 - 1,
    y: -((e.clientY - rect.top) / rect.height) * 2 + 1
  };

  raycaster.setFromCamera(touchPos, camera);
  const hits = raycaster.intersectObjects(dots.map(d => d.userData.image));
  if (hits.length && !active) {
    hits[0].object.scale.set(IMAGE_PRESS, IMAGE_PRESS, 1);
  }
});

/* Touch End */
renderer.domElement.addEventListener("pointerup", () => {
  if (!IS_TOUCH || !touchPos) return;
  isTouching = false;

  raycaster.setFromCamera(touchPos, camera);
  const hits = raycaster.intersectObjects(dots.map(d => d.userData.image));
  touchPos = null;

  resetFocus();

  if (hits.length) {
    const g = dots.find(d => d.userData.image === hits[0].object);
    if (g.userData.url) {
      window.open(g.userData.url, "_blank");
      return;
    }
    active = g;
    active.userData.image.scale.set(IMAGE_ACTIVE, IMAGE_ACTIVE, 1);
  }
});

/* ESC */
window.addEventListener("keydown", e => {
  if (e.key === "Escape") resetFocus();
});

/* ===== ANIMATION ===== */
function animate() {
  requestAnimationFrame(animate);

  if (!isTouching) {
    earth.rotation.y += 0.0014;
    clouds.rotation.y += 0.003;
  }

  dots.forEach(d => d.lookAt(camera.position));

if (!IS_TOUCH && !active) {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(
    dots.map(d => d.userData.image),
    false
  );

  if (hits.length) {
    const g = dots.find(d => d.userData.image === hits[0].object);

    if (hovered !== g) {
      if (hovered) {
        hovered.userData.image.scale.set(
          IMAGE_IDLE,
          IMAGE_IDLE,
          1
        );
      }

      hovered = g;
      hovered.userData.image.scale.set(
        IMAGE_HOVER,
        IMAGE_HOVER,
        1
      );
    }
  } else if (hovered) {
    hovered.userData.image.scale.set(
      IMAGE_IDLE,
      IMAGE_IDLE,
      1
    );
    hovered = null;
  }
} 

  if (active) {
    const dir = active.getWorldPosition(new THREE.Vector3()).normalize();
    camera.position.lerp(dir.multiplyScalar(CAMERA_DIST), 0.06);
  } else {
    camera.position.lerp(cameraHome, 0.07);
  }

  camera.lookAt(earth.position);
  renderer.render(scene, camera);
}
animate();

/* ===== RESIZE ===== */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
