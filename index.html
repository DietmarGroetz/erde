<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="./icons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="manifest" href="./icons/site.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden;}
#fade{
    #hint{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
color:#ffffffcc;
font-family:Arial, sans-serif;
font-size:14px;
letter-spacing:1px;
z-index:20;
pointer-events:none;
}
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:100;
pointer-events:none;
}
#earth-container{width:100%;height:100%;touch-action:none;}
#earth-container canvas{display:block;touch-action:none;-webkit-user-select:none;user-select:none;}
#search{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
padding:8px;
z-index:10;
background:#111;
border:none;
color:#fff;
outline:none;
}
@media (max-width: 768px) {
  #searchForm {
    display: none;
  }
}
#hint{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
color:#ffffffcc;
font-family:Arial, sans-serif;
font-size:14px;
letter-spacing:1px;
z-index:20;
pointer-events:none;
}
</style>
</head>
<body>
    <div id="fade"></div>

    <div id="earth-container"></div>
    
    <div id="hint">
    Drag to rotate • Hover a spot • Click to explore
    </div>
    
    <form id="searchForm">
    <input id="search" type="search" placeholder="Name suchen..." enterkeyhint="search" autocomplete="off" spellcheck="false">
    </form>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

const supabase = window.supabase.createClient(
  "https://vxucflqzkjzchjlibmvh.supabase.co",
  "sb_publishable_Sm8B9jYs3nmxo7ojSFQKxA_go0uK86L"
);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,3.8);
// ---------- MOBILE PARALLAX WITH PERMISSION ----------
const isMobile = window.matchMedia("(max-width: 768px)").matches;

if (isMobile && typeof DeviceOrientationEvent !== "undefined") {

    const enableParallax = () => {

        window.addEventListener("deviceorientation",(e)=>{

            if(e.gamma === null || e.beta === null) return;

            const tiltX = e.gamma * 0.003;
            const tiltY = e.beta * 0.003;

            earthGroup.rotation.y += tiltX;
            earthGroup.rotation.x += tiltY;

        });

        console.log("Parallax active");
    };

    // iOS requires permission
    if (typeof DeviceOrientationEvent.requestPermission === "function") {

        window.addEventListener("click", () => {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response === "granted") {
                        enableParallax();
                    }
                })
                .catch(console.error);
        }, { once: true });

    } else {
        // Android
        enableParallax();
    }
}
// ------------------------------------------------------
// ----------------------------------------------------
let spotMeta = [];

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.domElement.style.touchAction="none";
document.getElementById("earth-container").appendChild(renderer.domElement);

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();


let instancedMarkers=null;
let searchQuery="";
let hitMarkers = null;
let searchTargetIndex=null;
let appState="idle";
let openedImageMesh=null;
let openedIndex=null;
let previewMesh=null;
let hoveredIndex = null;
let markerPositions = [];
let hoverPauseUntil = 0;



let dragging=false;
let lastX=0,lastY=0;
let activePointerId=null;

const loader=new THREE.TextureLoader();
const textureCache = {};
function getTexture(url, callback){

if(textureCache[url]){
    callback(textureCache[url]);
    return;
}

loader.load(url,(texture)=>{
    textureCache[url] = texture;
    callback(texture);
});

}
const earthGroup=new THREE.Group();
scene.add(earthGroup);

scene.add(new THREE.AmbientLight(0xffffff,0.4));
const dirLight=new THREE.DirectionalLight(0xffffff,1.2);
dirLight.position.set(3,2,5);
scene.add(dirLight);

/* STARS */
const starGeo=new THREE.BufferGeometry();
const verts=[];
for(let i=0;i<7000;i++){
verts.push(
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200)
)}
starGeo.setAttribute("position",
new THREE.Float32BufferAttribute(verts,3));
scene.add(new THREE.Points(
starGeo,
new THREE.PointsMaterial({
color:0xffffff,
size:0.4,
map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/sprites/disc.png"),
transparent:true,
alphaTest:0.5
})
));

/* EARTH */
const earthTex=loader.load("./assets/earth_night.jpg");
earthTex.colorSpace=THREE.SRGBColorSpace;
earthGroup.add(new THREE.Mesh(
new THREE.SphereGeometry(1,64,64),
new THREE.MeshPhongMaterial({map:earthTex})
));

/* CITY LIGHTS */
const lightTex=loader.load("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_lights_2048.png");
lightTex.colorSpace=THREE.SRGBColorSpace;
earthGroup.add(new THREE.Mesh(
new THREE.SphereGeometry(1.002,64,64),
new THREE.MeshBasicMaterial({
map:lightTex,
transparent:true,
blending:THREE.AdditiveBlending,
depthWrite:false
})
));

/* CLOUDS */
const clouds=new THREE.Mesh(
new THREE.SphereGeometry(1.01,64,64),
new THREE.MeshBasicMaterial({
map:loader.load("https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/earth_clouds_1024.png"),
transparent:true,
opacity:0.35
})
);
earthGroup.add(clouds);
// ---------- STRONGER ATMOSPHERE ----------
const atmosphere = new THREE.Mesh(
    new THREE.SphereGeometry(1.12, 64, 64),
    new THREE.ShaderMaterial({
        transparent: true,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending,

        uniforms: {
            glowColor: { value: new THREE.Color(0x4da6ff) },
            viewVector: { value: camera.position }
        },

        vertexShader: `
            varying vec3 vNormal;
            varying vec3 vPositionNormal;

            void main() {

                vNormal = normalize(normalMatrix * normal);
                vPositionNormal = normalize((modelViewMatrix * vec4(position,1.0)).xyz);

                gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
            }
        `,

        fragmentShader: `
            uniform vec3 glowColor;
            varying vec3 vNormal;
            varying vec3 vPositionNormal;

            void main() {

             float intensity = pow(0.8 - dot(vNormal, vPositionNormal), 2.7);
                gl_FragColor = vec4(glowColor, intensity);

            }
        `
    })
);

earthGroup.add(atmosphere);

// -------------------------------------

/* SPOTS */
async function loadApprovedSpots(){

const { data } = await supabase
.from("spots")
.select("id,image_url,link_url,name")
.eq("approved", true);

if(!data) return;

spotMeta=data;

data.forEach(spot=>{
    if(spot.image_url){
        getTexture(spot.image_url,()=>{});
    }
});

const geometry = new THREE.SphereGeometry(0.015,16,16);
const material=new THREE.MeshStandardMaterial({
color:0xffffff,
emissive:0x666666,
metalness:0.9,
roughness:0.25
});

instancedMarkers=new THREE.InstancedMesh(
geometry,
material,
data.length
);
// größere unsichtbare Klickfläche
const hitGeometry = new THREE.SphereGeometry(0.05,8,8);
const hitMaterial = new THREE.MeshBasicMaterial({ visible:false });

hitMarkers = new THREE.InstancedMesh(
    hitGeometry,
    hitMaterial,
    data.length
);

earthGroup.add(hitMarkers);
const dummy=new THREE.Object3D();

for(let i=0;i<data.length;i++){

const lat=(Math.random()-0.5)*Math.PI;
const lon=Math.random()*Math.PI*2;
const r=1;

dummy.position.set(
r*Math.cos(lat)*Math.cos(lon),
r*Math.sin(lat),
r*Math.cos(lat)*Math.sin(lon)
);

const normal=dummy.position.clone().normalize();
dummy.position.add(normal.multiplyScalar(0.12));
dummy.lookAt(normal.clone().multiplyScalar(2));
dummy.updateMatrix();

instancedMarkers.setMatrixAt(i,dummy.matrix);
hitMarkers.setMatrixAt(i,dummy.matrix);
markerPositions.push(dummy.position.clone());
}

earthGroup.add(instancedMarkers);
}
loadApprovedSpots();
const searchInput = document.getElementById("search");
const searchForm = document.getElementById("searchForm");
searchInput.addEventListener("keydown",(e)=>{
    if(e.key === "Enter"){
        e.preventDefault();
        searchForm.dispatchEvent(new Event("submit",{cancelable:true}));
    }
});
searchForm.addEventListener("submit",(e)=>{
    e.preventDefault();

    if(!instancedMarkers) return;

    const query = searchInput.value.toLowerCase();
    if(query === "") return;

    let foundIndex = null;

    for(let i=0;i<spotMeta.length;i++){
        const name = spotMeta[i]?.name?.toLowerCase() || "";
        if(name.includes(query)){
            foundIndex = i;
            break;
        }
    }

    if(foundIndex === null) return;

    const matrix = new THREE.Matrix4();
    instancedMarkers.getMatrixAt(foundIndex, matrix);

    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(matrix);
    pos.applyMatrix4(instancedMarkers.matrixWorld);

    const earthPos = new THREE.Vector3();
    earthGroup.getWorldPosition(earthPos);

    const dir = pos.clone().sub(earthPos).normalize();
    const camTarget = earthPos.clone().add(dir.multiplyScalar(3.2));

    gsap.to(camera.position,{
        x:camTarget.x,
        y:camTarget.y,
        z:camTarget.z,
        duration:1.4,
        ease:"power3.inOut",
        onUpdate:()=>{
            camera.lookAt(earthPos);
        }
    });

    searchInput.blur();
});








/* POINTER */
renderer.domElement.addEventListener("pointerdown",(e)=>{
activePointerId=e.pointerId;
dragging=true;
lastX=e.clientX;
lastY=e.clientY;
});

renderer.domElement.addEventListener("pointermove",(e)=>{
    if(activePointerId !== null && e.pointerId !== activePointerId) return;
    if(dragging){

const sensitivity = e.pointerType === "touch" ? 0.015 : 0.005;

earthGroup.rotation.y += (e.clientX - lastX) * sensitivity;
earthGroup.rotation.x += (e.clientY - lastY) * sensitivity * 0.6;

lastX = e.clientX;
lastY = e.clientY;
return;
}

if(!instancedMarkers) return;

mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;
raycaster.setFromCamera(mouse,camera);


const intersects = raycaster.intersectObject(hitMarkers,false);

if(intersects.length === 0){

    if(previewMesh){
        scene.remove(previewMesh);
        previewMesh = null;
    }

    hoveredIndex = null;
    return;
}

const index = intersects[0].instanceId;
if(index === hoveredIndex) return;
hoveredIndex = index;
hoverPauseUntil = Date.now() +1600; // 1 Sekunde Pause

getTexture(spotMeta[index].image_url,(texture)=>{

    if(index !== hoveredIndex) return;

   

if(!previewMesh){
    previewMesh = new THREE.Mesh(
        new THREE.CircleGeometry(0.07,32),
        new THREE.MeshBasicMaterial({transparent:true})
    );
}

previewMesh.material.map = texture;
previewMesh.material.needsUpdate = true;


    previewMesh.position.copy(
        camera.position.clone().add(
            camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(1.8)
        )
    );

    previewMesh.lookAt(camera.position);
    scene.add(previewMesh);
});
});

renderer.domElement.addEventListener("pointerup",(e)=>{

dragging=false;
mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;
raycaster.setFromCamera(mouse,camera);
// Desktop: Klick auf Preview soll Explosion starten
if(previewMesh && hoveredIndex !== null){

const previewHit = raycaster.intersectObject(previewMesh);

if(previewHit.length > 0){

    const index = hoveredIndex;

    scene.remove(previewMesh);
    previewMesh = null;
    hoveredIndex = null;

    // Explosion starten wie bei Marker
    openedIndex = index;
    appState="open";

    getTexture(spotMeta[index].image_url,(texture)=>{

        const matrix=new THREE.Matrix4();
        instancedMarkers.getMatrixAt(index,matrix);
        const position = new THREE.Vector3();
        position.setFromMatrixPosition(matrix);
        position.applyMatrix4(instancedMarkers.matrixWorld);

        const group=new THREE.Group();
        scene.add(group);

        const dir=new THREE.Vector3();
        camera.getWorldDirection(dir);
        const target=camera.position.clone().add(dir.multiplyScalar(1.6));

        const particleCount = 220;

        for(let i=0;i<particleCount;i++){

            const piece = new THREE.Mesh(
                new THREE.PlaneGeometry(0.05,0.05),
                new THREE.MeshBasicMaterial({
                    map:texture,
                    transparent:true,
                    side:THREE.DoubleSide
                })
            );

            piece.position.copy(position);

            const explosionDir = new THREE.Vector3(
                (Math.random()-0.5),
                (Math.random()-0.5),
                (Math.random()-0.5)
            ).normalize();

            const strength = 0.6 + Math.random()*0.8;
            piece.position.add(explosionDir.multiplyScalar(strength));

            piece.rotation.set(
                Math.random()*Math.PI,
                Math.random()*Math.PI,
                Math.random()*Math.PI
            );

            group.add(piece);

            gsap.to(piece.position,{
                x:target.x,
                y:target.y,
                z:target.z,
                delay:0.4,
                duration:1.2,
                ease:"power3.inOut"
            });

            gsap.to(piece.rotation,{
                x:0,y:0,z:0,
                duration:1.6,
                ease:"power3.out"
            });
        }

        setTimeout(()=>{
            group.clear();
            scene.remove(group);
            openedImageMesh=new THREE.Mesh(
                new THREE.CircleGeometry(0.18,64),
                new THREE.MeshBasicMaterial({map:texture,transparent:true})
            );

            openedImageMesh.position.copy(target);
            openedImageMesh.lookAt(camera.position);
            scene.add(openedImageMesh);
            appState="open";
        },1200);

    });

    return;
}
}


// 🔴 BILD SCHLIESSEN WENN DANEBEN GEKLICKT
// 🔴 BILD SCHLIESSEN (egal wo geklickt wird)
if(appState==="open" && openedImageMesh){

const hitImage = raycaster.intersectObject(openedImageMesh);

// 👉 Klick AUF Bild = NICHT schließen
if(hitImage.length>0){
    return;
}

// 👉 Klick DANEBEN = schließen
scene.remove(openedImageMesh);
openedImageMesh=null;
openedIndex=null;
appState="idle";
return;
}

if(!instancedMarkers) return;

const intersects = raycaster.intersectObject(hitMarkers);
if(intersects.length===0) return;

const index=intersects[0].instanceId;
openedIndex=index;
appState="open";

getTexture(spotMeta[index].image_url,(texture)=>{

const matrix=new THREE.Matrix4();
instancedMarkers.getMatrixAt(index,matrix);
const position = new THREE.Vector3();
position.setFromMatrixPosition(matrix);

// 🔴 GANZ WICHTIG

// 👉 Local → World transformieren
position.applyMatrix4(instancedMarkers.matrixWorld);
const group=new THREE.Group();
scene.add(group);

const dir=new THREE.Vector3();
camera.getWorldDirection(dir);
const target=camera.position.clone().add(dir.multiplyScalar(1.6));

const particleCount = 220;

for(let i=0;i<particleCount;i++){

    const piece = new THREE.Mesh(
        new THREE.PlaneGeometry(0.05,0.05),
        new THREE.MeshBasicMaterial({
            map:texture,
            transparent:true,
            side:THREE.DoubleSide
        })
    );

    piece.position.copy(position);

    const explosionDir = new THREE.Vector3(
        (Math.random()-0.5),
        (Math.random()-0.5),
        (Math.random()-0.5)
    ).normalize();

    const strength = 0.6 + Math.random()*0.8;

    piece.position.add(explosionDir.multiplyScalar(strength));

    piece.rotation.set(
        Math.random()*Math.PI,
        Math.random()*Math.PI,
        Math.random()*Math.PI
    );

    group.add(piece);

    gsap.to(piece.position,{
        x:target.x,
        y:target.y,
        z:target.z,
        delay:0.4,
        duration:1.2,
        ease:"power3.inOut"
    });

    gsap.to(piece.rotation,{
        x:0,y:0,z:0,
        duration:1.6,
        ease:"power3.out"
    });
}

setTimeout(()=>{
group.clear();
scene.remove(group);
openedImageMesh=new THREE.Mesh(
new THREE.CircleGeometry(0.18,64),
new THREE.MeshBasicMaterial({map:texture,transparent:true})
);

openedImageMesh.position.copy(target);
openedImageMesh.lookAt(camera.position);
scene.add(openedImageMesh);
appState="open";
},1200);

});
});
renderer.domElement.addEventListener("dblclick",(e)=>{

if(appState!=="open" || !openedImageMesh) return;

mouse.x=(e.clientX/innerWidth)*2-1;
mouse.y=-(e.clientY/innerHeight)*2+1;
raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObject(openedImageMesh);
if(hit.length===0) return;

const spot=spotMeta[openedIndex];
if(spot?.link_url){
    window.open(spot.link_url,"_blank");
}

});
/* ANIMATE */
function animate(){
requestAnimationFrame(animate);
// ---------- CINEMATIC BREATHING ----------
const t = Date.now() * 0.0007;
camera.position.z = 3.8 + Math.sin(t) * 0.065;
// -----------------------------------------

if(!dragging && searchTargetIndex === null){

if(Date.now() > hoverPauseUntil){
    earthGroup.rotation.y += 0.0014;
}

}

clouds.rotation.y+=0.003;


/* Puls */
if(instancedMarkers){
const time=Date.now()*0.002;
const dummy=new THREE.Object3D();

for(let i=0;i<instancedMarkers.count;i++){
const matrix=new THREE.Matrix4();
instancedMarkers.getMatrixAt(i,matrix);
const pos=new THREE.Vector3();
const quat=new THREE.Quaternion();
const scl=new THREE.Vector3();
matrix.decompose(pos,quat,scl);

let strength=0.18;
if(i===searchTargetIndex) strength=0.45;

const pulse=1+strength*Math.sin(time);

dummy.position.copy(pos);
dummy.quaternion.copy(quat);
dummy.scale.set(pulse,pulse,pulse);
dummy.updateMatrix();
instancedMarkers.setMatrixAt(i,dummy.matrix);
}

instancedMarkers.instanceMatrix.needsUpdate=true;
}



 

camera.lookAt(earthGroup.position);
renderer.render(scene,camera);
}
animate();
gsap.to("#hint",{
opacity:0,
delay:4,
duration:1
});
gsap.to("#fade",{
opacity:0,
duration:1.5,
ease:"power2.out"
});
</script>
</body>
</html>
